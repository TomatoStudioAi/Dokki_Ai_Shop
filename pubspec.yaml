name: dokki_ai_shop
description: AI Bot Marketplace for Small Business.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Backend & Security
  supabase_flutter: ^2.4.0
  flutter_secure_storage: ^9.0.0
  envied: ^0.5.0

  # Network
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.8
  envied_generator: ^0.5.0

flutter:
  uses-material-design: true